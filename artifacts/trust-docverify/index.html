<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- ✅ سياسة أمان المحتوى (CSP) - الحماية من XSS -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: https:;
      connect-src 'self' http://localhost:3000 http://localhost:5173 https://*.alchemy.com https://*.etherscan.io;
      frame-src 'self' https://*.etherscan.io;
    " />

    <!-- ✅ منع تنفيذ الملفات الخبيثة -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    
    <!-- ✅ منع النقر المخفي (Clickjacking) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    
    <!-- ✅ تفعيل حماية XSS في المتصفحات القديمة -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    
    <!-- ✅ تحديد مصدر الإحالة -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <meta property="og:title" content="TrustDoc - نظام التحقق من الوثائق والتوقيع الرقمي" />
    <meta property="og:description" content="منصة آمنة لمنع تزوير الوثائق باستخدام التوقيع الرقمي وتقنية البلوك تشين." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TrustDoc" />
    <meta name="twitter:description" content="منصة آمنة لمنع تزوير الوثائق باستخدام التوقيع الرقمي وتقنية البلوك تشين." />

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Google Fonts: Cairo for Arabic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
